<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JTBD 待完成任务 · 深度分析报告</title>
<link rel="stylesheet" href="radium-dark.css">
<style>
/* ============ 设计令牌：白天默认（对齐后端 JTBD 报告模板：靛蓝+青） ============ */
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --card-2:#f8fafc;
  --ink:#0f1b2d;
  --slate:#475569;
  --muted:#94a3b8;
  --line:rgba(15,27,45,.10);
  --line-soft:rgba(15,27,45,.06);
  --brand:#4f46e5;        /* 主色：靛蓝（对齐后端模板） */
  --brand2:#0ea5e9;       /* 青（梯度副色） */
  --brand-bg:#eef2ff;     /* 靛蓝浅底（CORE JOB 用） */
  --indigo:#4d8bff;
  --green:#16a34a;
  --pink:#e11d48;
  --amber:#d97706;
  --cyan:#0891b2;
  --purple:#7c3aed;
  --red:#dc2626;
  --teal:#0f766e;
  --shadow:0 2px 10px rgba(31,36,48,.04);
  --shadow-sm:0 1px 4px rgba(31,36,48,.04);
  --radius:14px;
  --radius-sm:10px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  --mono:"JetBrains Mono","SF Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  padding-bottom:60px;
}
.wrap{max-width:880px;margin:0 auto;padding:0 18px;}
h1,h2,h3{letter-spacing:-.01em;line-height:1.3;}

/* ============ 顶栏 ============ */
.topbar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;padding:14px 22px;
  background:color-mix(in srgb, var(--card) 88%, transparent);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.topbar .left{display:flex;align-items:center;gap:14px;min-width:0;}
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:600;color:var(--slate);
  text-decoration:none;padding:7px 12px;border-radius:10px;
  border:1px solid var(--line);background:var(--card-2);
  transition:.18s;white-space:nowrap;
}
.back-link:hover{color:var(--brand);border-color:var(--brand);}
.brand{font-size:15px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;min-width:0;}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--brand);box-shadow:0 0 12px var(--brand);}
.brand small{font-weight:500;color:var(--muted);font-size:12px;}
.theme-toggle{
  display:inline-flex;align-items:center;gap:7px;cursor:pointer;
  border:1px solid var(--line);background:var(--card-2);
  color:var(--slate);font-size:13px;font-weight:600;
  padding:8px 13px;border-radius:11px;transition:.18s;white-space:nowrap;
}
.theme-toggle:hover{border-color:var(--brand);color:var(--brand);}
.theme-toggle .ti{font-size:15px;}

/* ============ Hero（对齐后端：渐变盒 + 白字 + 胶囊） ============ */
.hero{
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;border-radius:18px;padding:28px 30px;
  box-shadow:0 10px 30px rgba(79,70,229,.18);
  margin-top:26px;
}
.hero .kicker{
  display:inline-flex;align-items:center;gap:8px;
  font-size:12px;letter-spacing:.04em;font-weight:600;
  background:rgba(255,255,255,.18);color:#fff;
  padding:5px 12px;border-radius:999px;margin-bottom:14px;
}
.hero h1{font-size:24px;font-weight:700;margin-bottom:8px;color:#fff;}
.hero .sub{font-size:14px;opacity:.92;max-width:680px;}
.pctx{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
.pctx .pc{
  display:inline-flex;align-items:center;gap:7px;
  font-size:12px;color:#fff;
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);
  padding:5px 11px;border-radius:999px;
}
.pctx .pc b{font-weight:700;color:#fff;}
.pctx .pc .ic{font-size:13px;}

/* ============ 卡片（每节一个 .card，对齐后端） ============ */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 24px;margin-top:18px;box-shadow:var(--shadow);
}
.card h2{font-size:16px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:9px;}
.card h2 .n{
  width:24px;height:24px;border-radius:7px;background:var(--brand);color:#fff;
  font-size:13px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex:none;
}

/* CORE JOB 高亮 */
.job{font-size:15px;background:var(--brand-bg);border-left:4px solid var(--brand);padding:16px 18px;border-radius:10px;color:#312e81;line-height:1.6;}
.job .sit{color:var(--pink);font-weight:600;}
.job .act{color:var(--brand);font-weight:600;}
.job .out{color:var(--green);font-weight:600;}
.job .meta{margin-top:12px;font-size:12px;color:var(--muted);}

/* 三层任务（扁平盒 + 彩色标题，对齐后端） */
.layers{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.layer{border:1px solid var(--line);border-radius:12px;padding:14px;}
.layer h3{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--brand);}
.layer.em h3{color:var(--pink);} .layer.so h3{color:var(--teal);}
.layer .lbody{font-size:13px;color:var(--slate);line-height:1.6;margin-bottom:10px;}
.ev{display:flex;flex-wrap:wrap;gap:6px;}
.ev .chip{display:inline-block;background:var(--card-2);border:1px solid var(--line);border-radius:999px;padding:3px 10px;font-size:12px;color:var(--slate);}
.layer.func .ev .chip{color:var(--brand);border-color:color-mix(in srgb,var(--brand) 30%,transparent);}
.layer.em .ev .chip{color:var(--pink);border-color:color-mix(in srgb,var(--pink) 30%,transparent);}
.layer.so .ev .chip{color:var(--teal);border-color:color-mix(in srgb,var(--teal) 30%,transparent);}

/* 情境地图（行式，对齐后端 circ-row） */
.circ-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13px;align-items:baseline;}
.circ-row:last-child{border-bottom:none;}
.circ-name{width:120px;color:var(--brand);font-weight:600;flex:none;}
.circ-items{display:flex;flex-wrap:wrap;gap:6px;}
.circ-items .chip{display:inline-block;background:var(--card-2);border:1px solid var(--line);border-radius:999px;padding:3px 10px;font-size:12px;color:var(--slate);}

/* 阻碍力量（进度条 + 强度等级，对齐后端 obs） */
.obs{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);}
.obs:last-child{border-bottom:none;}
.obs .t{width:200px;font-size:13px;color:var(--ink);flex:none;}
.obs .t .c{color:var(--muted);font-family:var(--mono);margin-left:4px;font-size:12px;}
.obs .bar{flex:1;height:8px;background:var(--card-2);border-radius:99px;overflow:hidden;}
.obs .bar i{display:block;height:100%;background:var(--brand);border-radius:99px;}
.lvl{font-size:11px;padding:2px 8px;border-radius:99px;flex:none;}
.lvl.high{background:#fee2e2;color:var(--red);} .lvl.mid{background:#fef3c7;color:var(--amber);}
.lvl.low{background:#e0f2fe;color:var(--brand2);}

/* 期望进程（行式，对齐后端） */
.prow{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;align-items:baseline;}
.prow:last-child{border-bottom:none;}
.prow .pn{width:28px;color:var(--green);font-weight:700;font-family:var(--mono);flex:none;}
.prow .pt{font-weight:600;color:var(--ink);}
.prow .pd{color:var(--slate);margin-left:6px;}

/* 四力模型（2 列，对齐后端） */
.forces{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.force{border:1px solid var(--line);border-radius:12px;padding:14px;}
.force h3{font-size:13px;font-weight:600;margin-bottom:8px;}
.force.push h3{color:var(--pink);} .force.pull h3{color:var(--brand);}
.force.anx h3{color:var(--amber);} .force.habit h3{color:var(--teal);}
.force .fd{font-size:12.5px;color:var(--slate);line-height:1.55;}

/* 行动建议（3 列，对齐后端） */
.recs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.rec{border:1px solid var(--line);border-top:3px solid var(--brand);border-radius:12px;padding:14px;background:var(--card-2);}
.rec.mkt{border-color:var(--brand2);border-top-color:var(--brand2);}
.rec.inn{border-color:var(--teal);border-top-color:var(--teal);}
.rec h3{font-size:13px;font-weight:600;margin-bottom:8px;}
.rec ul{list-style:none;font-size:13px;color:var(--slate);} .rec li{padding:3px 0;padding-left:14px;position:relative;line-height:1.5;}
.rec li:before{content:"·";position:absolute;left:2px;color:var(--brand);}

/* 数据附录（表格，对齐后端 appx） */
.appx{font-size:12px;color:var(--slate);}
.appx table{width:100%;border-collapse:collapse;margin-top:4px;}
.appx th,.appx td{border:1px solid var(--line);padding:7px 9px;text-align:left;font-size:12px;vertical-align:top;}
.appx th{background:var(--card-2);font-weight:700;color:var(--ink);}
.appx td .c{color:var(--muted);font-family:var(--mono);margin-left:4px;}

/* 空状态 */
.empty-state{text-align:center;padding:70px 20px;}
.empty-state .eic{font-size:54px;margin-bottom:18px;}
.empty-state h2{font-size:22px;margin-bottom:10px;}
.empty-state p{color:var(--slate);max-width:460px;margin:0 auto 22px;}
.empty-state .ebtn{display:inline-block;background:var(--brand);color:#fff;font-weight:600;padding:12px 22px;border-radius:12px;text-decoration:none;font-size:14px;}

/* 页脚 */
.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:24px;}

/* ============ 夜晚模式：本站深空，渐变 Hero 暗色化，其余靠 token 翻转 ============ */
body[data-theme="dark"]{
  --brand:#60a5fa; --brand2:#a78bfa; --pink:#f43f5e; --amber:#f59e0b;
  --teal:#2dd4bf; --red:#f87171; --green:#4ade80; --slate:#cbd5e1; --muted:#94a3b8;
  --bg:#0F1525; --card:rgba(28,38,64,.5); --card-2:rgba(255,255,255,.04);
  --line:rgba(255,255,255,.08); --ink:#e2e8f0;
  --brand-bg:rgba(96,165,250,.14);
}
body[data-theme="dark"] .hero{background:linear-gradient(135deg,#312e81,#0e7490);box-shadow:0 10px 30px rgba(0,0,0,.4);}
body[data-theme="dark"] .topbar{background:color-mix(in srgb,#0F1525 88%,transparent);border-bottom-color:rgba(255,255,255,.10);}
body[data-theme="dark"] .topbar .brand{color:#fff;}
body[data-theme="dark"] .topbar .brand small{color:#94a3b8;}
body[data-theme="dark"] .back-link,body[data-theme="dark"] .theme-toggle{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:#cbd5e1;}
body[data-theme="dark"] .back-link:hover,body[data-theme="dark"] .theme-toggle:hover{border-color:#93C5FD;color:#93C5FD;}
body[data-theme="dark"] .card{background:rgba(28,38,64,.5);border-color:rgba(255,255,255,.10);box-shadow:0 2px 10px rgba(0,0,0,.25);}
body[data-theme="dark"] .card h2{color:#fff;}
body[data-theme="dark"] .card h2 .n{background:#60a5fa;}
body[data-theme="dark"] .job{background:rgba(96,165,250,.14);border-left-color:#60a5fa;color:#dbeafe;}
body[data-theme="dark"] .job .meta{color:#94a3b8;}
body[data-theme="dark"] .layer,.force,body[data-theme="dark"] .rec{border-color:rgba(255,255,255,.10);}
body[data-theme="dark"] .layer{background:rgba(255,255,255,.03);}
body[data-theme="dark"] .layer h3{color:#a5b4fc;} body[data-theme="dark"] .layer.em h3{color:#f9a8d4;} body[data-theme="dark"] .layer.so h3{color:#5eead4;}
body[data-theme="dark"] .layer .lbody{color:#cbd5e1;}
body[data-theme="dark"] .ev .chip{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:#cbd5e1;}
body[data-theme="dark"] .layer.func .ev .chip{color:#a5b4fc;border-color:rgba(129,140,248,.4);}
body[data-theme="dark"] .layer.em .ev .chip{color:#f9a8d4;border-color:rgba(244,114,182,.4);}
body[data-theme="dark"] .layer.so .ev .chip{color:#5eead4;border-color:rgba(45,212,191,.4);}
body[data-theme="dark"] .circ-row,.obs,body[data-theme="dark"] .prow{border-color:rgba(255,255,255,.08);}
body[data-theme="dark"] .circ-name{color:#a5b4fc;}
body[data-theme="dark"] .circ-items .chip{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:#cbd5e1;}
body[data-theme="dark"] .obs .t,body[data-theme="dark"] .prow .pt{color:#E6EDF6;}
body[data-theme="dark"] .obs .bar{background:rgba(255,255,255,.08);}
body[data-theme="dark"] .lvl.high{background:rgba(248,113,113,.18);color:#fca5a5;}
body[data-theme="dark"] .lvl.mid{background:rgba(245,158,11,.18);color:#fcd34d;}
body[data-theme="dark"] .lvl.low{background:rgba(14,165,233,.18);color:#7dd3fc;}
body[data-theme="dark"] .prow .pn{color:#4ade80;}
body[data-theme="dark"] .force.push h3{color:#f9a8d4;} body[data-theme="dark"] .force.pull h3{color:#a5b4fc;}
body[data-theme="dark"] .force.anx h3{color:#fcd34d;} body[data-theme="dark"] .force.habit h3{color:#5eead4;}
body[data-theme="dark"] .force .fd,body[data-theme="dark"] .rec ul{color:#cbd5e1;}
body[data-theme="dark"] .rec{background:rgba(255,255,255,.03);}
body[data-theme="dark"] .appx th{background:rgba(255,255,255,.05);color:#fff;}
body[data-theme="dark"] .appx th,body[data-theme="dark"] .appx td{border-color:rgba(255,255,255,.10);}
body[data-theme="dark"] .empty-state h2{color:#fff;}
body[data-theme="dark"] .empty-state p{color:#cbd5e1;}
body[data-theme="dark"] .empty-state .ebtn{background:linear-gradient(135deg,#6366f1,#7c3aed);}
body[data-theme="dark"] .foot{color:#94a3b8;}

@media (max-width:680px){
  .layers,.recs{grid-template-columns:1fr;}
  .forces{grid-template-columns:1fr;}
  .circ-name{width:96px;}
  .obs .t{width:140px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="left">
    <a class="back-link" href="experience.html">← 返回全流程分析</a>
    <div class="brand"><span class="dot"></span>JTBD 待完成任务 <small>深度分析报告</small></div>
  </div>
  <button class="theme-toggle" id="themeToggle" data-active="light"><span class="ti">☀️</span><span class="tt">白天</span></button>
</div>

<div class="wrap" id="app"><!-- 动态渲染 --></div>

<script>
/* ===================== 跨页主题切换（与站点一致：voc_theme） ===================== */
(function(){
  function applyTheme(isDark){
    document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
    var btn = document.getElementById('themeToggle');
    if(!btn) return;
    btn.setAttribute('data-active', isDark ? 'dark' : 'light');
    btn.innerHTML = isDark
      ? '<span class="ti">🌙</span><span class="tt">夜晚</span>'
      : '<span class="ti">☀️</span><span class="tt">白天</span>';
  }
  var saved = localStorage.getItem('voc_theme');
  applyTheme(saved === 'dark');
  var btn = document.getElementById('themeToggle');
  if(btn) btn.addEventListener('click', function(){
    var next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('voc_theme', next);
    applyTheme(next === 'dark');
  });
})();

/* ===================== 数据读取 ===================== */
const LS_KEY = 'voc_tag_profile';
const PRODUCT_KEY = 'voc_product_context';

function loadProfile(){
  try { return JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch(e){ return null; }
}
function loadProduct(){
  try { return JSON.parse(localStorage.getItem(PRODUCT_KEY) || 'null'); } catch(e){ return null; }
}
function safeProf(p){
  if(!p || typeof p !== 'object') return null;
  if(!p.meta && !p.modules && !p.topTags) return null;
  return {
    meta: p.meta || { totalComments:0, preciseCount:0, provCount:0, coveredModules:0 },
    modules: p.modules || {},
    topTags: p.topTags || [],
    needPriority: p.needPriority || [],
    emotions: p.emotions || [],
    motMix: p.motMix || [],
    candidatePool: p.candidatePool || [],
    tagTree: p.tagTree || {}
  };
}

/* ===================== 通用工具 ===================== */
function topByModule(p, m, n){
  if(!p || !p.topTags) return [];
  return p.topTags.filter(t => t.m === m).sort((a,b)=>b.n-a.n).slice(0, n||5).map(t=>({t:t.t, n:t.n}));
}
function modTotal(p, m){
  const o = p && p.modules && p.modules[m];
  return o ? ((o.precise||0)+(o.prov||0)) : 0;
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* 关键词→情境分类映射（确定性） */
const CTX_RULES = [
  {key:'居家生活', icon:'🏠', kw:['居家','家里','家庭','卧室','客厅','厨房','浴室','床上','居家']},
  {key:'移动通勤', icon:'🚇', kw:['通勤','出差','旅行','旅游','户外','路上','车载','飞机','高铁','地铁','行李']},
  {key:'工作办公', icon:'💼', kw:['工作','办公','职场','会议','电脑','桌面','工位','公司']},
  {key:'健身运动', icon:'🏃', kw:['健身','运动','跑步','瑜伽','训练','锻炼','户外']},
  {key:'社交送礼', icon:'🎁', kw:['送礼','礼物','聚会','社交','朋友','生日','节日','送人']},
  {key:'母婴亲子', icon:'🍼', kw:['宝宝','婴儿','孩子','母婴','育儿','宠物','猫','狗']},
  {key:'睡眠休息', icon:'😴', kw:['睡眠','睡觉','休息','午休','助眠']}
];
function classifyContext(scene){
  for(const r of CTX_RULES){ if(r.kw.some(k=>scene.includes(k))) return r.key; }
  return '通用场景';
}
function ctxMeta(key){ return CTX_RULES.find(r=>r.key===key) || {key, icon:'🧩', kw:[]}; }

/* 情绪→情感任务映射（确定性） */
const EMO_MAP = {
  '信任':{feel:'安心、可信赖',hint:'怕被骗/怕劣质'},
  '满意':{feel:'满足',hint:'物有所值'},
  '喜悦':{feel:'愉悦',hint:'使用有乐趣'},
  '期待':{feel:'憧憬',hint:'开箱/使用前兴奋'},
  '平静':{feel:'放松',hint:'缓解焦虑'},
  '惊喜':{feel:'被取悦',hint:'超出预期'},
  '爱':{feel:'依赖与喜爱',hint:'成为日常必备'},
  '愤怒':{feel:'被尊重',hint:'反感被敷衍'},
  '恐惧':{feel:'安全',hint:'怕伤人/怕故障'},
  '悲伤':{feel:'被关怀',hint:'怕孤独/怕不便'},
  '厌恶':{feel:'清爽体面',hint:'怕脏/怕廉价'},
  '焦虑':{feel:'从容',hint:'怕不确定'}
};
function emoFeel(name){
  for(const k in EMO_MAP){ if(name.includes(k)) return EMO_MAP[k]; }
  return {feel:'被理解、被满足', hint:'体验顺滑'};
}

/* ===================== JTBD 确定性引擎 ===================== */
const Engine = {
  /* 核心任务陈述：When [情境], I want [动作], so I can [进步] */
  mainJob(p, prod){
    const scenes = topByModule(p,'使用场景',2).map(x=>x.t);
    const motives = topByModule(p,'购买动机',2).map(x=>x.t);
    const needs = (p.needPriority||[]).slice(0,1).map(x=>x.t);
    const sit = scenes[0] || (prod && prod.categoryName ? `使用${prod.categoryName}` : '使用产品');
    const act = motives[0] || needs[0] || '获得核心价值';
    const out = needs[0] || motives[1] || '改善生活体验';
    return {
      sit, act, out,
      rawScene: scenes, rawMotive: motives,
      text: `当我想<span class="sit">${esc(sit)}</span>时，我希望能<span class="act">${esc(act)}</span>，从而<span class="out">${esc(out)}</span>。`
    };
  },

  /* 三层任务 */
  layers(p, prod){
    const scenes = topByModule(p,'使用场景',4).map(x=>x.t);
    const motives = topByModule(p,'购买动机',4).map(x=>x.t);
    const obstacles = topByModule(p,'使用阻碍',4).map(x=>x.t);
    const pos = (p.emotions||[]).filter(e=>e.polarity>0).sort((a,b)=>b.count-a.count).slice(0,3);
    const profile = topByModule(p,'用户画像',3).map(x=>x.t);
    const loyalty = topByModule(p,'用户忠诚度',2).map(x=>x.t);

    const funcCore = scenes[0] || (prod && prod.categoryName ? `用好${prod.categoryName}` : '完成核心使用任务');
    const funcBlock = obstacles[0] ? `，即使遇到「${obstacles[0]}」` : '';
    const funcBody = `用户需要稳定、可靠地完成「${funcCore}」${funcBlock}，并且结果可预期、少折腾。`;

    const emoFeels = pos.length ? pos.map(e=>emoFeel(e.name).feel) : (motives.slice(0,2).length?['被理解','被满足']:['安心、顺手']);
    const emoBody = `在使用过程中，用户希望感到${emoFeels.join('、')}；购买动机里反复出现的「${motives[0]||'核心价值'}」本质上是一种情感诉求。`;

    const socSignal = obstacles.some(o=>/隐私|尴尬|羞耻|社死|廉价|掉价/.test(o)) ? '体面、不被评判地拥有' : '被看作懂行、有品位';
    const socBody = profile.length
      ? `面向「${profile.join('、')}」这类人群，用户希望被他人看作「${socSignal}」；忠诚用户（${loyalty[0]||'复购者'}）更在意圈层认同。`
      : `用户希望被他人看作「${socSignal}」，产品是其身份与品味的延伸。`;

    return [
      {cls:'func', t:'功能任务', body:funcBody, ev:[funcCore,...obstacles.slice(0,2)]},
      {cls:'emo', t:'情感任务', body:emoBody, ev:[...pos.map(e=>e.name),...motives.slice(0,2)]},
      {cls:'soc', t:'社会任务', body:socBody, ev:[...profile.slice(0,2), socSignal]}
    ];
  },

  /* 任务情境地图 */
  circumstances(p){
    const scenes = topByModule(p,'使用场景',8).map(x=>x.t);
    const buckets = {};
    scenes.forEach(s=>{
      const k = classifyContext(s);
      buckets[k] = buckets[k] || {items:[], n:0};
      buckets[k].items.push(s); buckets[k].n++;
    });
    if(!scenes.length){
      return {empty:true, items:[]};
    }
    const items = Object.entries(buckets).map(([k,v])=>({key:k, ...ctxMeta(k), items:v.items, n:v.n})).sort((a,b)=>b.n-a.n);
    return {empty:false, items};
  },

  /* 阻碍力量（阻止任务完成的障碍，按强度分级） */
  obstacles(p){
    const obs = topByModule(p,'使用阻碍',6).map(x=>x.t);
    const expGap = (p.needPriority||[]).filter(x=>(x.imp||0) < .25).map(x=>x.t);
    const list = [];
    obs.forEach((o)=>{
      const n = (topByModule(p,'使用阻碍',20).find(x=>x.t===o)||{}).n || 0;
      const sev = n>=15?'hi':(n>=6?'mid':'lo');
      list.push({t:o, n, sev, d:obstacleDesc(o), tag:`出现 ${n} 次`});
    });
    expGap.forEach(g=>{ if(!list.some(l=>l.t===g)) list.push({t:g, n:0, sev:'mid', d:'需求重要但未满足，形成隐性落差', tag:'需求优先级偏低'}); });
    return list;
  },

  /* 期望进程 / 待达成结果 */
  progress(p){
    const improves = topByModule(p,'产品改进建议',5).map(x=>x.t);
    const needs = (p.needPriority||[]).slice(0,5).map(x=>x.t);
    const out = [];
    let i=1;
    improves.forEach(t=>out.push({n:('0'+i++).slice(-2), t, d:'来自用户主动提出的改进建议'}));
    needs.forEach(t=>{ if(!out.some(o=>o.t===t)) out.push({n:('0'+i++).slice(-2), t, d:'来自需求优先级排序'}); });
    return out.slice(0,8);
  },

  /* JTBD 四力模型（切换/采用动力） */
  forces(p, prod){
    const neg = (p.emotions||[]).filter(e=>e.polarity<0).sort((a,b)=>b.count-a.count).slice(0,2).map(e=>e.name);
    const obstacles = topByModule(p,'使用阻碍',3).map(x=>x.t);
    const motives = topByModule(p,'购买动机',3).map(x=>x.t);
    const improves = topByModule(p,'产品改进建议',3).map(x=>x.t);
    const loyalty = topByModule(p,'用户忠诚度',2).map(x=>x.t);

    return [
      {cls:'push', fi:'🔥', t:'推力（现状逼迫）', d: neg.length?`负面体验「${neg.join('、')}」与阻碍「${obstacles[0]||'不便'}」把用户推出旧方案。`:`现有方案的痛点与不便是切换起点。`},
      {cls:'pull', fi:'🧲', t:'拉力（新方案吸引）', d: motives.length?`购买动机「${motives.join('、')}」与改进期待「${improves[0]||'更好体验'}」把用户拉向新方案。`:`对更好体验的期待形成吸引。`},
      {cls:'anx', fi:'⚠️', t:'焦虑（对新方案担忧）', d: obstacles.some(o=>/质量|售后|安装|续航|材质|假/.test(o))?`用户对「${obstacles.find(o=>/质量|售后|安装|续航|材质|假/.test(o))}」存在信任焦虑，是最大采用阻力。`:`不确定性（效果/适配/售后）带来采用焦虑。`},
      {cls:'habit', fi:'🔁', t:'习惯（旧方案惯性）', d: loyalty.length?`忠诚用户「${loyalty.join('、')}」已形成使用惯性，需强理由才迁移。`:`已有习惯与替代方案构成惯性阻力。`}
    ];
  },

  /* 行动建议（产品/营销/创新） */
  recommendations(p, prod, job){
    const obstacles = topByModule(p,'使用阻碍',3).map(x=>x.t);
    const improves = topByModule(p,'产品改进建议',3).map(x=>x.t);
    const motives = topByModule(p,'购买动机',3).map(x=>x.t);
    const emo = (p.emotions||[]).filter(e=>e.polarity>0).slice(0,2).map(e=>e.name);
    const profile = topByModule(p,'用户画像',2).map(x=>x.t);
    const workarounds = topByModule(p,'克服方式',3).map(x=>x.t);

    const product = [];
    if(obstacles[0]) product.push(`优先消除头号阻碍「${obstacles[0]}」，把它列为下个版本 P0。`);
    if(improves[0]) product.push(`落地改进建议「${improves[0]}」，这是用户用脚投票的高频诉求。`);
    if(job.out) product.push(`围绕核心收益「${job.out}」重构卖点与功能优先级，确保任务可被完成。`);
    if(!product.length) product.push('导入真实标签后，此处将自动生成本产品的具体改进项。');

    const market = [];
    if(motives[0]) market.push(`传播聚焦购买动机「${motives[0]}」，用真实评价原话做信任背书。`);
    if(emo[0]) market.push(`情感诉求打「${emoFeel(emo[0]).feel}」，场景化素材对准${job.sit||'核心场景'}。`);
    if(profile[0]) market.push(`目标人群锚定「${profile.join('、')}」，渠道与 KOL 与之匹配。`);
    if(!market.length) market.push('导入真实标签后，此处将自动生成面向人群的营销话术。');

    const innov = [];
    if(workarounds[0]) innov.push(`workaround「${workarounds[0]}」本身就是创新线索——用户在教我们怎么做产品。`);
    if(obstacles[1]) innov.push(`未被满足的「${obstacles[1]}」是差异化突破口，可做成独占卖点。`);
    innov.push('把社会任务（被看作懂行/体面）做成可分享、可晒的设计语言，放大口碑。');
    if(!workarounds.length) innov.push('导入克服方式标签后，此处将揭示用户自发创新机会。');

    return {product, market, innov};
  },

  /* 数据附录：哪些标签喂给了结论 */
  appendix(p){
    const mods = ['购买动机','使用场景','使用阻碍','产品改进建议','用户画像','用户忠诚度','克服方式','预期符合度'];
    return mods.map(m=>{
      const items = topByModule(p, m, 6);
      return {m, items};
    }).filter(x=>x.items.length);
  }
};

function obstacleDesc(o){
  if(/质量|做工|材质|廉价|坏/.test(o)) return '品质与耐用性未达预期，削弱功能任务完成度。';
  if(/安装|操作|复杂|难用|说明/.test(o)) return '上手成本高，中断了任务的顺畅完成。';
  if(/续航|耗电|速度|卡/.test(o)) return '性能/能耗表现拖慢任务节奏。';
  if(/售后|物流|退/.test(o)) return '服务链条的断层放大了采用焦虑。';
  if(/尺寸|适合|适配/.test(o)) return '适配不确定性导致不敢下单。';
  if(/隐私|尴尬|羞耻/.test(o)) return '社会任务受阻，用户不愿外露。';
  return '该阻碍直接拉低了任务完成体验。';
}

/* ===================== 渲染（对齐后端 JTBD 报告模板） ===================== */
function render(){
  const app = document.getElementById('app');
  const p = safeProf(loadProfile());
  const prod = loadProduct();

  if(!p){
    app.innerHTML = `
      <div class="empty-state">
        <div class="eic">🎯</div>
        <h2>还没有可分析的 VOC 数据</h2>
        <p>JTBD 报告需要真实的打标数据。请先在 <b>VOC 打标页</b> 完成打标并「🚀 带入全流程分析」，或在 <b>全流程分析页</b> 导入/粘贴标签数据，本页会自动读取并生成分析。</p>
        <a class="ebtn" href="experience.html">前往全流程分析 →</a>
      </div>`;
    return;
  }

  const job = Engine.mainJob(p, prod);
  const layers = Engine.layers(p, prod);
  const ctx = Engine.circumstances(p);
  const obstacles = Engine.obstacles(p);
  const progress = Engine.progress(p);
  const forces = Engine.forces(p, prod);
  const recs = Engine.recommendations(p, prod, job);
  const appendix = Engine.appendix(p);

  const total = p.meta.totalComments || 0;
  const precise = p.meta.preciseCount || 0;
  const covered = p.meta.coveredModules || Object.keys(p.modules||{}).length;

  const pctxHtml = (()=>{
    const arr = [];
    if(prod){
      if(prod.purposeName) arr.push(`<span class="pc"><span class="ic">🎯</span><b>目的</b> ${esc(prod.purposeName)}</span>`);
      if(prod.categoryName) arr.push(`<span class="pc"><span class="ic">📦</span><b>类目</b> ${esc(prod.categoryName)}</span>`);
      if(prod.desc) arr.push(`<span class="pc"><span class="ic">📝</span>${esc(prod.desc.slice(0,40))}${prod.desc.length>40?'…':''}</span>`);
    }
    arr.push(`<span class="pc"><span class="ic">💬</span><b>评价</b> ${total} 条 · ${precise} 精确标签</span>`);
    arr.push(`<span class="pc"><span class="ic">🧩</span><b>覆盖</b> ${covered} 个模块</span>`);
    return arr.join('');
  })();

  /* 三层任务 */
  const layersHtml = layers.map(L=>`
    <div class="layer ${L.cls}">
      <h3>${esc(L.t)}</h3>
      <div class="lbody">${esc(L.body)}</div>
      <div class="ev">${L.ev.filter(Boolean).slice(0,5).map(e=>`<span class="chip">${esc(e)}</span>`).join('')}</div>
    </div>`).join('');

  /* 情境地图（行式） */
  const ctxHtml = ctx.empty
    ? `<div class="circ-row"><div class="circ-name">暂无</div><div class="circ-items"><span class="chip">导入含「使用场景」维度的数据后，此处自动聚类出任务情境地图。</span></div></div>`
    : ctx.items.map(c=>`
      <div class="circ-row">
        <div class="circ-name">${esc(c.key)}</div>
        <div class="circ-items">${c.items.slice(0,8).map(it=>`<span class="chip">${esc(it)}</span>`).join('')}</div>
      </div>`).join('');

  /* 阻碍力量（条形 + 强度等级） */
  const maxN = Math.max(1, ...obstacles.map(o=>o.n||0));
  const obstHtml = obstacles.length ? obstacles.map(o=>{
    const w = Math.max(6, Math.round((o.n||0)/maxN*100));
    const lvl = o.sev==='hi'?'高强度':(o.sev==='mid'?'中强度':'低强度');
    const lcls = o.sev==='hi'?'high':(o.sev==='mid'?'mid':'low');
    return `<div class="obs">
      <div class="t">${esc(o.t)}<span class="c">×${o.n||0}</span></div>
      <div class="bar"><i style="width:${w}%"></i></div>
      <span class="lvl ${lcls}">${lvl}</span>
    </div>`;
  }).join('') : `<div class="circ-row"><div class="circ-name">提示</div><div class="circ-items"><span class="chip">未检测到「使用阻碍」标签，任务完成阻力较低。</span></div></div>`;

  /* 期望进程（行式） */
  const progHtml = progress.length ? progress.map(pc=>`
    <div class="prow">
      <div class="pn">${pc.n}</div>
      <div><span class="pt">${esc(pc.t)}</span><span class="pd">${esc(pc.d)}</span></div>
    </div>`).join('') : `<div class="circ-row"><div class="circ-name">提示</div><div class="circ-items"><span class="chip">导入「产品改进建议 / 需求优先级」后，此处列出用户期望达成的进程。</span></div></div>`;

  /* 四力 */
  const forcesHtml = forces.map(f=>`
    <div class="force ${f.cls}">
      <h3>${f.fi} ${esc(f.t)}</h3>
      <div class="fd">${esc(f.d)}</div>
    </div>`).join('');

  /* 行动建议 */
  const recsHtml = `
    <div class="rec"><h3>🛠️ 产品侧</h3><ul>${recs.product.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
    <div class="rec mkt"><h3>📣 营销侧</h3><ul>${recs.market.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
    <div class="rec inn"><h3>💡 创新侧</h3><ul>${recs.innov.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`;

  /* 数据附录（表格） */
  const appxHtml = appendix.length ? `<div class="appx"><table>
    <tr><th>模块</th><th>Top 标签（频次）</th></tr>
    ${appendix.map(a=>`<tr><th>${esc(a.m)}</th><td>${a.items.map(it=>`${esc(it.t)}<span class="c">×${it.n}</span>`).join('　')}</td></tr>`).join('')}
  </table></div>` : '';

  app.innerHTML = `
    <section class="hero">
      <span class="kicker">🎯 JTBD · Jobs To Be Done</span>
      <h1>用户真正想完成的任务</h1>
      <p class="sub">基于你导入的真实 VOC 标签数据，用 JTBD 框架确定性推导（无需大模型）：用户在什么情境下、想完成什么任务、期望获得什么进步，以及是什么阻碍了任务完成。</p>
      <div class="pctx">${pctxHtml}</div>
    </section>

    <div class="card"><h2><span class="n">★</span>CORE JOB · 核心任务陈述</h2>
      <div class="job">
        ${job.text}
        <div class="meta">由「使用场景 / 购买动机 / 需求优先级」标签确定性合成 · ${job.rawScene.length?('情境信号：'+job.rawScene.join('、')):'（无场景标签，使用默认）'} · ${job.rawMotive.length?('动机信号：'+job.rawMotive.join('、')):'（无动机标签，使用默认）'}</div>
      </div>
    </div>

    <div class="card"><h2><span class="n">1</span>三层任务结构</h2>
      <div class="layers">${layersHtml}</div>
    </div>

    <div class="card"><h2><span class="n">2</span>任务情境地图</h2>
      ${ctxHtml}
    </div>

    <div class="card"><h2><span class="n">3</span>阻碍任务完成的力量（按出现频次分级）</h2>
      ${obstHtml}
    </div>

    <div class="card"><h2><span class="n">4</span>用户期望达成的进程</h2>
      ${progHtml}
    </div>

    <div class="card"><h2><span class="n">5</span>JTBD 四力模型</h2>
      <div class="forces">${forcesHtml}</div>
    </div>

    <div class="card"><h2><span class="n">6</span>行动建议</h2>
      <div class="recs">${recsHtml}</div>
    </div>

    <div class="card"><h2><span class="n">7</span>数据附录 · 标签来源</h2>
      ${appxHtml || '<div class="appx">未检测到可展示的标签。</div>'}
    </div>

    <div class="foot">
      本报告由 <b>JTBD 确定性引擎</b> 基于浏览器内真实 VOC 标签生成，未调用大模型。<br>
      数据来源：voc_tag_profile · 产品上下文：voc_product_context · 主题与站点跨页共享。
    </div>`;
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
